<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilha do Aluno — Chamada</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f8f6;
    --surface: #ffffff;
    --border: #e2e2dd;
    --border2: #d0d0c8;
    --text: #1a1a18;
    --text2: #5a5a54;
    --text3: #9a9a90;
    --orange: #e85d04;
    --orange-light: #fff3ed;
    --orange-border: #f4a261;
    --green: #2d6a4f;
    --green-bg: #eaf4ee;
    --red: #9b2226;
    --red-bg: #fdecea;
    --radius: 8px;
    --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
  .header-icon { width: 36px; height: 36px; background: var(--orange); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; }
  .header-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  .header p { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .tabs { display: flex; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px; margin-bottom: 1.25rem; gap: 2px; }
  .tab { flex: 1; padding: 7px 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--orange); color: #fff; }
  .section { display: none; }
  .section.active { display: block; }
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  input[type=text], input[type=password] { width: 100%; padding: 10px 12px 10px 36px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border 0.15s; }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--orange); }
  input.no-icon { padding-left: 12px; }
  .results { border: 0.5px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); overflow: hidden; max-height: 320px; overflow-y: auto; }
  .result-item { padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--bg); }
  .result-nome { font-size: 14px; font-weight: 500; }
  .result-contrato { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .result-arrow { color: var(--text3); font-size: 18px; }
  .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-nome { font-size: 17px; font-weight: 600; }
  .card-contrato { font-size: 13px; color: var(--text3); margin-top: 2px; margin-bottom: 1.25rem; }
  .modulo-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; margin-top: 16px; }
  .modulo-label:first-of-type { margin-top: 0; }
  .aulas-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .aula-btn { border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px 4px; text-align: center; cursor: pointer; background: var(--bg); transition: all 0.15s; user-select: none; }
  .aula-btn:active { transform: scale(0.96); }
  .aula-num { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
  .aula-val { font-size: 22px; font-weight: 600; color: var(--text3); }
  .aula-btn.presente { background: var(--green-bg); border-color: #74c69d; }
  .aula-btn.presente .aula-val { color: var(--green); }
  .aula-btn.falta { background: var(--red-bg); border-color: #e07070; }
  .aula-btn.falta .aula-val { color: var(--red); }
  .hint { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .aula-dt { font-size: 9px; color: var(--text3); margin-top: 3px; line-height: 1.2; }
  .btn-back { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text2); font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 1rem; }
  .btn-back:hover { color: var(--text); }
  .btn-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .btn-primary { width: 100%; padding: 11px; background: var(--orange); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .hist-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .hist-item:last-child { border-bottom: none; }
  .hist-nome { font-size: 14px; font-weight: 500; }
  .hist-det { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-c { background: var(--green-bg); color: var(--green); }
  .badge-f { background: var(--red-bg); color: var(--red); }
  .loading { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.erro { background: var(--red); }
  .saving-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--orange); margin-left: 8px; animation: pulse 1s infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-bar { font-size: 12px; color: var(--text3); text-align: right; margin-bottom: 8px; min-height: 18px; }
  .pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; }
  .pin-screen h2 { font-size: 18px; font-weight: 600; }
  .pin-screen p { font-size: 14px; color: var(--text2); text-align: center; }
  .pin-input { width: 200px; padding: 12px; text-align: center; font-size: 20px; letter-spacing: 0.2em; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <div>
      <h1>Trilha do Aluno</h1>
      <p>Sistema de chamada — CEBRAC</p>
    </div>
  </div>

  <div id="pin-screen" class="pin-screen" style="display:none;">
    <h2>Acesso restrito</h2>
    <p>Digite o PIN para acessar o sistema</p>
    <input type="password" class="pin-input no-icon" id="pin-input" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')verificarPin()" />
    <button class="btn-primary" style="width:200px" onclick="verificarPin()">Entrar</button>
  </div>

  <div id="app-content" style="display:none;">
    <div class="status-bar" id="status-bar"></div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('busca')">Buscar</button>
      <button class="tab" onclick="setTab('novo')">Novo aluno</button>
      <button class="tab" onclick="setTab('historico')">Histórico</button>
      <button class="tab" onclick="setTab('auditoria')">Auditoria</button>
    </div>

    <div id="sec-busca" class="section active">
      <div id="busca-lista">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Nome ou número do contrato..." oninput="filtrar()" autocomplete="off" />
        </div>
        <div class="results" id="results"></div>
      </div>
      <div id="busca-detalhe" style="display:none;">
        <button class="btn-back" onclick="voltarLista()">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Voltar
        </button>
        <div class="card" id="detalhe-card"></div>
      </div>
    </div>

    <div id="sec-novo" class="section">
      <div class="card">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" class="no-icon" id="novo-nome" placeholder="Ex: João Silva Santos" />
        </div>
        <div class="form-group">
          <label>Número do contrato</label>
          <input type="text" class="no-icon" id="novo-contrato" placeholder="Ex: 38200" />
        </div>
        <button class="btn-primary" id="btn-salvar-novo" onclick="salvarNovoAluno()">Salvar aluno</button>
      </div>
    </div>

    <div id="sec-historico" class="section">
      <div class="card" id="historico-card">
        <div class="loading">Carregando...</div>
      </div>
    </div>

    <div id="sec-auditoria" class="section">
      <div class="card" id="auditoria-card">
        <div class="loading">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://joszmqohhceuxhsjxxcr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impvc3ptcW9oaGNldXhoc2p4eGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODEwNjEsImV4cCI6MjA5Njg1NzA2MX0.sSPFSYVtNGbgelrcQNK2mS-1KCk13A5ROid7E0YewIg';
const PIN_CORRETO = '1927';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ALUNOS_BASE = [];

let todosAlunos = [...ALUNOS_BASE];
let alunoAtual = null;
let presencasCache = {};
let autenticado = false;

function verificarPin() {
  const pin = document.getElementById('pin-input').value;
  if (pin === PIN_CORRETO) {
    autenticado = true;
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    carregarTodosAlunos();
  } else {
    toast('PIN incorreto', true);
    document.getElementById('pin-input').value = '';
  }
}

async function carregarTodosAlunos() {
  setStatus('Sincronizando...');
  // Carregar alunos do banco
  let pagina = 0;
  const tamanho = 1000;
  while (true) {
    const { data: lote } = await sb.from('alunos').select('contrato, nome, ano').range(pagina * tamanho, (pagina + 1) * tamanho - 1);
    if (!lote || !lote.length) break;
    lote.forEach(a => { if (!todosAlunos.find(x => x.contrato === a.contrato)) todosAlunos.push(a); });
    if (lote.length < tamanho) break;
    pagina++;
  }
  // Carregar presenças do banco
  const { data } = await sb.from('presencas').select('contrato, modulo, aula, status, atualizado_em, criado_em');
  if (data) {
    presencasCache = {};
    data.forEach(r => {
      if (!presencasCache[r.contrato]) presencasCache[r.contrato] = {};
      if (!presencasCache[r.contrato][r.modulo]) presencasCache[r.contrato][r.modulo] = {};
      presencasCache[r.contrato][r.modulo][r.aula] = { status: r.status, dt: r.atualizado_em || r.criado_em };
    });
  }
  setStatus('');
}

function setStatus(msg) {
  const el = document.getElementById('status-bar');
  el.innerHTML = msg ? `${msg}<span class="saving-dot"></span>` : '';
}

function normalizar(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function filtrar() {
  const q = normalizar(document.getElementById('search-input').value.trim());
  const el = document.getElementById('results');
  if (!q || q.length < 2) { el.innerHTML = '<div class="empty">Digite para buscar</div>'; return; }
  const found = todosAlunos.filter(a => normalizar(a.nome).includes(q) || a.contrato.includes(q)).slice(0, 15);
  if (!found.length) { el.innerHTML = '<div class="empty">Nenhum aluno encontrado</div>'; return; }
  el.innerHTML = found.map(a => `
    <div class="result-item" onclick="abrirAluno('${a.contrato}')">
      <div><div class="result-nome">${a.nome}</div><div class="result-contrato">Contrato ${a.contrato}</div></div>
      <span class="result-arrow">›</span>
    </div>`).join('');
}

function abrirAluno(contrato) {
  alunoAtual = todosAlunos.find(a => a.contrato === contrato);
  if (!alunoAtual) return;
  document.getElementById('busca-lista').style.display = 'none';
  document.getElementById('busca-detalhe').style.display = 'block';
  renderDetalhe();
}

function voltarLista() {
  alunoAtual = null;
  document.getElementById('busca-lista').style.display = 'block';
  document.getElementById('busca-detalhe').style.display = 'none';
}

function getStatus(contrato, modulo, aula) {
  const r = presencasCache[contrato] && presencasCache[contrato][modulo] && presencasCache[contrato][modulo][aula];
  return r ? r.status : '';
}

function getDtAula(contrato, modulo, aula) {
  const r = presencasCache[contrato] && presencasCache[contrato][modulo] && presencasCache[contrato][modulo][aula];
  if (!r || !r.dt) return '';
  const d = new Date(r.dt);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

async function ciclar(contrato, modulo, aula) {
  const atual = getStatus(contrato, modulo, aula);
  const proximo = atual === '' ? 'C' : atual === 'C' ? 'F' : '';
  if (!presencasCache[contrato]) presencasCache[contrato] = {};
  if (!presencasCache[contrato][modulo]) presencasCache[contrato][modulo] = {};
  if (proximo === '') {
    delete presencasCache[contrato][modulo][aula];
  } else {
    presencasCache[contrato][modulo][aula] = { status: proximo, dt: new Date().toISOString() };
  }
  renderDetalhe();
  setStatus('Salvando');
  if (proximo === '') {
    await sb.from('presencas').delete().eq('contrato', contrato).eq('modulo', modulo).eq('aula', aula);
  } else {
    await sb.from('presencas').upsert({ contrato, modulo, aula, status: proximo, nome: alunoAtual.nome }, { onConflict: 'contrato,modulo,aula' });
  }
  setStatus('');
}

function renderAulas(contrato, modulo, label) {
  let html = `<div class="modulo-label">${label}</div><div class="aulas-row">`;
  for (let i = 1; i <= 4; i++) {
    const key = `${contrato}_${modulo}_P${i}`;
    const s = getStatus(contrato, modulo, 'P' + i);
    const dt = getDtAula(contrato, modulo, 'P' + i);
    const cls = s === 'C' ? 'presente' : s === 'F' ? 'falta' : '';
    const val = s || '—';
    const dtHtml = dt ? `<div class="aula-dt">${dt}</div>` : '';
    html += `<div class="aula-btn ${cls}" onclick="ciclar('${contrato}','${modulo}','P${i}')">
      <div class="aula-num">Aula ${i}</div>
      <div class="aula-val">${val}</div>
      ${dtHtml}
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderDetalhe() {
  const c = alunoAtual.contrato;
  document.getElementById('detalhe-card').innerHTML = `
    <div class="card-nome">${alunoAtual.nome}</div>
    <div class="card-contrato">Contrato ${c}</div>
    ${renderAulas(c, 'PIEP', 'PIEP — 4 aulas')}
    ${renderAulas(c, 'EMP', 'Empregabilidade — 4 aulas')}
    <div class="hint">Toque para alternar: — → C (presente) → F (falta) → —</div>`;
}

async function salvarNovoAluno() {
  const nome = document.getElementById('novo-nome').value.trim();
  const contrato = document.getElementById('novo-contrato').value.trim();
  if (!nome || !contrato) { toast('Preencha nome e contrato', true); return; }
  if (todosAlunos.find(a => a.contrato === contrato)) { toast('Contrato já cadastrado', true); return; }
  const btn = document.getElementById('btn-salvar-novo');
  btn.disabled = true;
  setStatus('Salvando');
  const { error } = await sb.from('alunos').insert({ contrato, nome, ano: '2026' });
  btn.disabled = false;
  setStatus('');
  if (error) { toast('Erro ao salvar', true); return; }
  todosAlunos.push({ contrato, nome });
  document.getElementById('novo-nome').value = '';
  document.getElementById('novo-contrato').value = '';
  toast(`${nome} cadastrado com sucesso`);
}

function setTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['busca','novo','historico','auditoria'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  if (tab === 'historico') carregarHistorico();
  if (tab === 'auditoria') carregarAuditoria();
}

async function carregarHistorico() {
  const el = document.getElementById('historico-card');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  const { data } = await sb.from('presencas').select('*').order('criado_em', { ascending: false }).limit(50);
  if (!data || !data.length) { el.innerHTML = '<div class="empty">Nenhum lançamento ainda.</div>'; return; }
  el.innerHTML = data.map(r => {
    const dt = new Date(r.criado_em).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<div class="hist-item">
      <div class="hist-nome">${r.nome}</div>
      <div class="hist-det">
        ${r.modulo.startsWith('PIEP') ? 'PIEP' : 'Empregabilidade'} · Aula ${r.aula.replace('P','')} ·
        <span class="badge ${r.status === 'C' ? 'badge-c' : 'badge-f'}">${r.status === 'C' ? 'Presente' : 'Falta'}</span>
        · ${dt}
      </div>
    </div>`;
  }).join('');
}

async function carregarAuditoria() {
  const el = document.getElementById('auditoria-card');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  const { data } = await sb.from('auditoria').select('*').order('momento', { ascending: false }).limit(100);
  if (!data || !data.length) { el.innerHTML = '<div class="empty">Nenhuma alteração registrada.</div>'; return; }
  el.innerHTML = '<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)">Últimas 100 alterações</div>' +
    data.map(r => {
      const dt = new Date(r.momento).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const de = r.status_anterior ? `<span class="badge ${r.status_anterior==='C'?'badge-c':'badge-f'}">${r.status_anterior}</span> → ` : 'Novo → ';
      const para = `<span class="badge ${r.status_novo==='C'?'badge-c':'badge-f'}">${r.status_novo}</span>`;
      return `<div class="hist-item">
        <div class="hist-nome">${r.nome}</div>
        <div class="hist-det">
          ${r.modulo === 'PIEP' ? 'PIEP' : 'Empregabilidade'} · Aula ${r.aula.replace('P','')} · ${de}${para} · ${dt}
        </div>
      </div>`;
    }).join('');
}

function toast(msg, erro) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (erro ? ' erro' : '') + ' show';
  setTimeout(() => t.className = 'toast', 2500);
}

window.onload = () => {
  document.getElementById('pin-screen').style.display = 'flex';
};
</script>
</body>
</html>
